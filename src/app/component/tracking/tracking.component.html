        </div>
    </div>
</div>
<!-- Mobile Banner -->
<div class="container-fluid bg-secondary my-5 d-md-none banner-image-wrapper">
    <div class="container">
        <div class="row align-items-center">
            <img src="../../assets/img/PRR_home.jpg" class="img-fluid w-100" alt="Logistics Banner">
        </div>
    </div>
</div>

<!-- Track Your Orders Section -->
<div class="container-fluid my-5">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-7 py-5 py-lg-0">
                <div class="content-wrapper">
                    <h3 class="text-primary text-uppercase font-weight-bold">Track Your Orders</h3>
                    <h6 class="mb-4"></h6>
                    <p class="mb-4">
                        For shipment tracking, please submit your shipment details and tracking requirements using the form below or email us at rajesh@prrtransglobal.com. Our customer support team will provide you with an update within one business hour during working hours.
                    </p>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="bg-primary py-5 px-4 px-sm-5">
                    <form (ngSubmit)="onSubmit()" [formGroup]="checkoutForm">

                        <input type="text" formControlName="trackingid"  class="form-control border-light" style="padding: 30px;" name="trackingid" placeholder="BL NUMBER / CONTAINER NUMBER" required="">
                        <br>
                        <input type="email" formControlName="email"  class="form-control border-light" style="padding: 30px;" name="email" placeholder="Email" required="">
                        <br>
                        <div class="input-group-append">
                            <button class="btn btn-primary btn-lg px-4 py-2">Track & Trace</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
